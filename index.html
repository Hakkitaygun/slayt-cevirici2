<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slayt Çevirici — Ücretsiz PDF & PPTX Türkçe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: rgba(255,255,255,0.07);
      --border-h: rgba(255,255,255,0.15);
      --accent: #4f8ef7;
      --accent2: #7eb3ff;
      --glow: rgba(79,142,247,0.22);
      --g-blue: #4285f4;
      --g-green: #34a853;
      --text: #eef2ff;
      --muted: #7a8aa0;
      --dim: #3a4a60;
      --ok: #34d399;
      --err: #f87171;
      --warn: #fbbf24;
      --ff: 'Syne', sans-serif;
      --fb: 'DM Sans', sans-serif;
      --r: 12px;
      --rl: 20px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,142,247,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,.025) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;z-index:0}
    .wrap{max-width:920px;margin:0 auto;padding:0 24px;position:relative;z-index:1}

    header{padding:36px 0 26px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px}
    .logo h1{font-family:var(--ff);font-size:26px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(130deg,#fff 0%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .logo p{font-size:13px;color:var(--muted);margin-top:4px;font-weight:300}
    .hright{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .free-pill{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;background:rgba(52,168,83,.12);border:1px solid rgba(52,168,83,.3);color:#34a853;padding:5px 12px;border-radius:99px}
    .free-pill .dot{width:6px;height:6px;border-radius:50%;background:#34a853;box-shadow:0 0 6px #34a853}
    .api-btn{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:99px;cursor:pointer;transition:all .2s}
    .api-btn:hover{border-color:var(--accent);color:var(--accent2)}
    .api-btn .d{width:6px;height:6px;border-radius:50%;background:var(--dim)}
    .api-btn.on .d{background:var(--ok);box-shadow:0 0 6px var(--ok)}

    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
    .modal-bg.open{display:flex}
    .modal{background:var(--surface);border:1px solid var(--border-h);border-radius:var(--rl);padding:30px;width:100%;max-width:460px;margin:20px}
    .modal .mlogo{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .modal .mlogo .gi{width:32px;height:32px;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#4285f4;font-family:Georgia,serif}
    .modal h3{font-family:var(--ff);font-size:17px;font-weight:700}
    .msub{font-size:13px;color:var(--muted);margin-bottom:8px;line-height:1.65}
    .msub a{color:var(--accent2);text-decoration:none}
    .msub a:hover{text-decoration:underline}
    .guide{background:rgba(79,142,247,.07);border:1px solid rgba(79,142,247,.18);border-radius:var(--r);padding:14px 16px;margin:12px 0 16px;font-size:13px;color:var(--muted);line-height:1.85}
    .guide b{color:var(--text)}
    .guide a{color:var(--accent2);text-decoration:none}
    .guide a:hover{text-decoration:underline}
    .modal input[type=password]{width:100%;background:var(--bg);border:1px solid var(--border-h);border-radius:var(--r);padding:11px 14px;color:var(--text);font-family:monospace;font-size:13px;letter-spacing:.05em;outline:none;transition:border-color .2s}
    .modal input:focus{border-color:var(--accent)}
    .mbtns{display:flex;gap:10px;margin-top:14px}
    .bsave{flex:1;background:var(--g-blue);color:#fff;border:none;border-radius:var(--r);padding:11px;font-family:var(--ff);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
    .bsave:hover{opacity:.9;transform:translateY(-1px)}
    .bcancel{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:var(--r);padding:11px 20px;font-size:14px;cursor:pointer;transition:all .2s}
    .bcancel:hover{border-color:var(--border-h);color:var(--text)}

    .drop{border:1.5px dashed var(--border-h);border-radius:var(--rl);padding:44px 32px;text-align:center;cursor:pointer;transition:all .25s;background:var(--surface);position:relative;overflow:hidden;margin-bottom:18px}
    .drop::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,var(--glow),transparent 70%);opacity:0;transition:opacity .3s;pointer-events:none}
    .drop:hover::after,.drop.over::after{opacity:1}
    .drop:hover,.drop.over{border-color:var(--accent);transform:translateY(-2px)}
    .drop.over{background:rgba(79,142,247,.04)}
    .dicon{width:52px;height:52px;background:linear-gradient(135deg,var(--accent),#6366f1);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:22px;position:relative;z-index:1}
    .drop h2{font-family:var(--ff);font-size:19px;font-weight:700;margin-bottom:7px;position:relative;z-index:1}
    .drop p{font-size:13px;color:var(--muted);position:relative;z-index:1;line-height:1.6}
    .lnk{color:var(--accent2);text-decoration:underline;cursor:pointer}
    .pills{display:flex;gap:8px;justify-content:center;margin-top:14px;position:relative;z-index:1;flex-wrap:wrap}
    .pill{background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:4px 12px;font-size:12px;color:var(--muted);font-weight:500}
    #fi{display:none}

    .fq{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
    .fitem{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 15px;transition:border-color .2s}
    .fitem:hover{border-color:var(--border-h)}
    .fic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .fic.pdf{background:rgba(248,113,113,.15)}
    .fic.pptx{background:rgba(251,191,36,.15)}
    .fmeta{flex:1;min-width:0}
    .fn{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .fsz{font-size:11px;color:var(--muted);margin-top:2px}
    .fst{font-size:12px;font-weight:600;flex-shrink:0}
    .fst.p{color:var(--dim)}.fst.r{color:var(--warn)}.fst.d{color:var(--ok)}.fst.e{color:var(--err)}
    .rm{background:none;border:none;color:var(--dim);cursor:pointer;font-size:15px;padding:4px 6px;border-radius:6px;transition:all .15s;flex-shrink:0}
    .rm:hover{color:var(--err);background:rgba(248,113,113,.1)}

    .cbar{display:none;align-items:center;gap:12px;margin-bottom:26px;flex-wrap:wrap}
    .cbar.on{display:flex}
    .lg{display:flex;align-items:center;gap:8px}
    .lg label{font-size:13px;color:var(--muted)}
    select{background:var(--surface);border:1px solid var(--border-h);border-radius:var(--r);padding:9px 13px;color:var(--text);font-family:var(--fb);font-size:13px;cursor:pointer;outline:none}
    select:focus{border-color:var(--accent)}
    .bgo{display:flex;align-items:center;gap:8px;flex:1;justify-content:center;background:linear-gradient(135deg,var(--g-blue),#1a73e8);color:#fff;border:none;border-radius:var(--r);padding:11px 28px;font-family:var(--ff);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
    .bgo:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(66,133,244,.35)}
    .bgo:disabled{opacity:.4;cursor:not-allowed}
    .spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:none}
    .bgo.ld .spin{display:block}
    @keyframes sp{to{transform:rotate(360deg)}}

    .pgwrap{display:none;margin-bottom:26px}
    .pgwrap.on{display:block}
    .pghead{display:flex;justify-content:space-between;margin-bottom:9px}
    .pglbl{font-size:13px;color:var(--muted)}
    .pgcnt{font-size:13px;font-weight:700;color:var(--accent2)}
    .pgtrack{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
    .pgfill{height:100%;background:linear-gradient(90deg,var(--g-blue),var(--accent2));border-radius:2px;transition:width .35s ease;width:0%}
    .logbox{margin-top:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;font-size:12px;color:var(--muted);font-family:monospace;max-height:110px;overflow-y:auto;line-height:1.9}
    .lok{color:var
